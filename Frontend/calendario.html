<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calendario Settimanale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a href="dashboard.html" class="navbar-brand fw-bold">← Torna alla Dashboard</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center">
                        <label class="form-label fw-bold text-primary">Scegli un giorno per visualizzare la relativa settimana:</label>
                        <input type="date" class="form-control form-control-lg border-primary text-center" id="data_settimana" onchange="caricaCalendario()">
                    </div>
                </div>
            </div>
        </div>

        <h4 class="text-primary fw-bold mb-3 border-bottom pb-2">I Miei Impegni Settimanali</h4>
        <div class="row mb-5" id="impegniUtente">
            <div class="col-12 text-muted">Caricamento in corso...</div>
        </div>

        <h4 class="text-primary fw-bold mb-3 border-bottom pb-2">Occupazione Sale nella Settimana</h4>
        <div class="row" id="occupazioneSale">
            <div class="col-12 text-muted">Caricamento in corso...</div>
        </div>
    </div>

    <script>
        document.getElementById('data_settimana').value = new Date().toISOString().split('T')[0];
        
        function caricaCalendario() {
            const dataSelezionata = document.getElementById('data_settimana').value;
            if(!dataSelezionata) return;

            fetch(`../backend/get_calendario.php?data=${dataSelezionata}`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.json())
            .then(data => {
                if(!data.success) { alert(data.message); return; }
                
                // --- STAMPA IMPEGNI ---
                const divImpegni = document.getElementById('impegniUtente');
                divImpegni.innerHTML = '';
                if(data.impegni.length === 0) {
                    divImpegni.innerHTML = '<div class="col-12"><div class="alert alert-light border">Nessun impegno in questa settimana.</div></div>';
                } else {
                    data.impegni.forEach(imp => {
                        divImpegni.innerHTML += `
                            <div class="col-md-4 mb-3">
                                <div class="card h-100 border-success border-start border-4 shadow-sm">
                                    <div class="card-body">
                                        <h5 class="fw-bold">${imp.attivita}</h5>
                                        <p class="mb-1 text-muted">📍 ${imp.nome_sala}</p>
                                        <p class="mb-1 text-muted">📅 ${imp.data}</p>
                                        <p class="mb-0 text-muted">🕒 Ore ${imp.ora_inizio}:00 (${imp.durata}h)</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                // --- STAMPA OCCUPAZIONE SALE ---
                const divSale = document.getElementById('occupazioneSale');
                divSale.innerHTML = '';
                if(data.sale.length === 0) {
                    divSale.innerHTML = '<div class="col-12"><div class="alert alert-light border">Nessuna sala occupata in questa settimana.</div></div>';
                } else {
                    const saleMap = {}; // Raggruppo le prenotazioni per nome della sala
                    data.sale.forEach(s => {
                        if(!saleMap[s.nome_sala]) saleMap[s.nome_sala] = [];
                        saleMap[s.nome_sala].push(s);
                    });

                    for(const [nomeSala, prenotazioni] of Object.entries(saleMap)) {
                        let lista = prenotazioni.map(p => `<li><strong>${p.data}</strong> (Ore ${p.ora_inizio}:00) - ${p.attivita}</li>`).join('');
                        divSale.innerHTML += `
                            <div class="col-md-6 mb-3">
                                <div class="card h-100 border-info border-start border-4 shadow-sm bg-white">
                                    <div class="card-body">
                                        <h5 class="fw-bold text-info border-bottom pb-2">${nomeSala}</h5>
                                        <ul class="text-muted mb-0 ps-3">${lista}</ul>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
            });
        }
        caricaCalendario(); // Carica appena apri la pagina
    </script>
</body>
</html>
