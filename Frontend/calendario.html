<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calendario Settimanale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a href="dashboard.html" class="navbar-brand fw-bold">← Torna alla Dashboard</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center">
                        <label class="form-label fw-bold text-primary">Scegli un giorno per visualizzare la relativa settimana:</label>
                        <input type="date" class="form-control form-control-lg border-primary text-center" id="data_settimana" onchange="caricaCalendario()">
                    </div>
                </div>
            </div>
        </div>

        <h4 class="text-primary fw-bold mb-3 border-bottom pb-2">I Miei Impegni Settimanali</h4>
        <div class="row mb-5" id="impegniUtente">
            <div class="col-12 text-muted">Caricamento in corso...</div>
        </div>

        <h4 class="text-primary fw-bold mb-3 border-bottom pb-2">Occupazione Sale nella Settimana</h4>
        <div class="row" id="occupazioneSale">
            <div class="col-12 text-muted">Caricamento in corso...</div>
        </div>
    </div>

    <div class="modal fade" id="modalModifica" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title fw-bold">Modifica Prenotazione</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body bg-light">
                    <form id="formModifica">
                        <input type="hidden" id="edit_id">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted">Attività</label>
                            <input type="text" class="form-control" id="edit_attivita" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted">Data</label>
                                <input type="date" class="form-control" id="edit_data" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted">Ora Inizio</label>
                                <input type="number" class="form-control" id="edit_ora" min="9" max="23" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted">Durata (Ore)</label>
                                <input type="number" class="form-control" id="edit_durata" min="1" max="5" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-warning fw-bold" onclick="salvaModifica()">Salva Modifiche</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('data_settimana').value = new Date().toISOString().split('T')[0];
        
        function caricaCalendario() {
            const dataSelezionata = document.getElementById('data_settimana').value;
            if(!dataSelezionata) return;

            fetch(`../backend/get_calendario.php?data=${dataSelezionata}`, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.json())
            .then(data => {
                if(!data.success) { alert(data.message); return; }
                
                const currentUserId = data.current_user_id;

                // --- STAMPA IMPEGNI ---
                const divImpegni = document.getElementById('impegniUtente');
                divImpegni.innerHTML = '';
                if(data.impegni.length === 0) {
                    divImpegni.innerHTML = '<div class="col-12"><div class="alert alert-light border">Nessun impegno in questa settimana.</div></div>';
                } else {
                    data.impegni.forEach(imp => {
                        divImpegni.innerHTML += `
                            <div class="col-md-4 mb-3">
                                <div class="card h-100 border-success border-start border-4 shadow-sm">
                                    <div class="card-body">
                                        <h5 class="fw-bold">${imp.attivita}</h5>
                                        <p class="mb-1 text-muted">📍 ${imp.nome_sala}</p>
                                        <p class="mb-1 text-muted">📅 ${imp.data}</p>
                                        <p class="mb-0 text-muted">⏱ Ore ${imp.ora_inizio}:00 (${imp.durata}h)</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                // --- STAMPA OCCUPAZIONE SALE A TABELLA ---
                const divSale = document.getElementById('occupazioneSale');
                divSale.innerHTML = '';
                if(data.sale.length === 0) {
                    divSale.innerHTML = '<div class="col-12"><div class="alert alert-light border">Nessuna sala occupata in questa settimana.</div></div>';
                } else {
                    const saleMap = {}; 
                    data.sale.forEach(s => {
                        if(!saleMap[s.nome_sala]) saleMap[s.nome_sala] = [];
                        saleMap[s.nome_sala].push(s);
                    });

                    for(const [nomeSala, prenotazioni] of Object.entries(saleMap)) {
                        let righeTabella = prenotazioni.map(p => {
                            const isMia = (p.id_responsabile == currentUserId);
                            const rowClass = isMia ? 'table-warning' : ''; 
                            const btnModifica = isMia ? 
                                `<button class="btn btn-sm btn-outline-dark" onclick="apriModaleModifica(${p.id}, '${p.attivita.replace(/'/g, "\\'")}', '${p.data}', ${p.ora_inizio}, ${p.durata || 1})">✏️ Modifica</button>` : 
                                '';

                            return `
                            <tr class="${rowClass}">
                                <td>${p.data}</td>
                                <td>${p.ora_inizio}:00</td>
                                <td>${p.durata}h</td> <td>${p.attivita}</td>
                                <td class="text-center">${btnModifica}</td>
                            </tr>`;
                        }).join('');

                        divSale.innerHTML += `
                            <div class="col-12 mb-4">
                                <div class="card border-info border-start border-4 shadow-sm bg-white">
                                    <div class="card-body">
                                        <h5 class="fw-bold text-info mb-3">${nomeSala}</h5>
                                        <div class="table-responsive">
                                            <table class="table table-hover table-bordered mb-0 align-middle">
                                                <thead class="table-light">
                                                    <tr>
                                                        <th>Data</th>
                                                        <th>Ora</th>
                                                        <th>Durata</th> <th>Attività</th>
                                                        <th class="text-center" style="width: 120px;">Azioni</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    ${righeTabella}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
            })
            .catch(err => {
                document.getElementById('occupazioneSale').innerHTML = '<div class="alert alert-danger">Errore di comunicazione col server.</div>';
            });
        }

        let modaleModificaInstance = null;

        function apriModaleModifica(id, attivita, data, ora, durata) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_attivita').value = attivita;
            document.getElementById('edit_data').value = data;
            document.getElementById('edit_ora').value = ora;
            document.getElementById('edit_durata').value = durata;
            
            modaleModificaInstance = new bootstrap.Modal(document.getElementById('modalModifica'));
            modaleModificaInstance.show();
        }

        function salvaModifica() {
            const formData = new URLSearchParams();
            formData.append('id', document.getElementById('edit_id').value);
            formData.append('attivita', document.getElementById('edit_attivita').value);
            formData.append('data', document.getElementById('edit_data').value);
            formData.append('ora_inizio', document.getElementById('edit_ora').value);
            formData.append('durata', document.getElementById('edit_durata').value);

            fetch('../backend/aggiorna_prenotazione.php', {
                method: 'POST',
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    modaleModificaInstance.hide();
                    caricaCalendario(); 
                } else {
                    alert("Errore: " + data.message);
                }
            })
            .catch(err => {
                alert("Errore di connessione col server.");
            });
        }

        caricaCalendario(); 
    </script>
</body>
</html>
