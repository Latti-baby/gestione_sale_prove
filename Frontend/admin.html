<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Pannello Admin - Gestione Sale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

</head>
<body class="bg-light">

    <nav class="navbar navbar-dark admin-navbar mb-4 py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fs-4 fw-bold">👑 Pannello di Controllo Globale</span>
            <button class="btn btn-light text-primary fw-bold shadow-sm" onclick="logout()">Esci (Logout)</button>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-5">
            <div class="col-12">
                <div class="card table-custom-shadow border-0">
                    <div class="card-header bg-white border-bottom py-3">
                        <h5 class="mb-0 text-primary fw-bold">📊 Statistiche Occupazione Sale per Settore</h5>
                    </div>
                    <div class="card-body" style="height: 280px;">
                        <canvas id="chartSettori"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-12">
                <div class="d-flex align-items-center mb-3 border-bottom pb-2">
                    <h4 class="mb-0 text-dark fw-bold">📅 In programma Oggi</h4>
                    <span class="ms-3 badge bg-white text-dark border shadow-sm fs-6" id="dataOggiLabel"></span>
                </div>
                <div class="row g-3" id="grigliaOggi">
                    </div>
            </div>
        </div>

        <div class="card table-custom-shadow border-0 mb-4">
            <div class="card-header bg-white border-bottom py-3">
                <h5 class="mb-0 text-primary fw-bold">🔍 Tutte le Prenotazioni</h5>
            </div>
            <div class="card-body bg-light">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label text-muted small fw-bold">Cerca per Attività o Sala</label>
                        <input type="text" id="filtroTesto" class="form-control" placeholder="Es. Prove o Sala A...">
                    </div>
                    <div class="col-md-5">
                        <label class="form-label text-muted small fw-bold">Filtra per Settore</label>
                        <select id="filtroSettore" class="form-select border-primary">
                            <option value="">Tutti i settori</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100 fw-bold" onclick="applicaFiltri()">Filtra</button>
                    </div>
                </div>
            </div>
            
            <div class="table-responsive bg-white p-3 rounded-bottom">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted">
                        <tr>
                            <th>Attività</th>
                            <th>Sala (Occupati / Max)</th> 
                            <th>Settore</th>
                            <th>Data e Ora</th>
                            <th class="text-end">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="tabellaReport">
                        </tbody>
                </table>
            </div>
        </div>
    </div> <div class="modal fade" id="modalModifica" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Modifica Prenotazione</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formModifica">
                        <input type="hidden" id="edit_id">
                        <div class="mb-3">
                            <label class="form-label">Attività</label>
                            <input type="text" class="form-control" id="edit_attivita" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control" id="edit_data" required>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <label class="form-label">Ora Inizio</label>
                                <input type="number" class="form-control" id="edit_ora" min="9" max="23" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Durata (h)</label>
                                <input type="number" class="form-control" id="edit_durata" min="1" max="5" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-primary" onclick="salvaModifica()">Salva Modifiche</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
