<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione - Gestione Sale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="card shadow mx-auto border-0" style="max-width: 500px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4 text-primary fw-bold">Nuova Registrazione</h3>
            
            <form id="formRegistrazione" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">Nome</label>
                        <input type="text" class="form-control" id="reg_nome" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">Cognome</label>
                        <input type="text" class="form-control" id="reg_cognome" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">Email</label>
                    <input type="email" class="form-control" id="reg_email" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small">Password</label>
                    <input type="password" class="form-control" id="reg_password" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">Data di Nascita</label>
                        <input type="date" class="form-control" id="reg_data">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold small">Ruolo</label>
                        <select class="form-select" id="reg_ruolo" required>
                            <option value="allievo">Allievo</option>
                            <option value="docente">Docente</option>
                            <option value="tecnico">Tecnico</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small">Foto Profilo (Opzionale)</label>
                    <input type="file" class="form-control" id="reg_foto" accept="image/*">
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold">Registrati Ora</button>
                
                <div class="text-center mt-3">
                    <a href="../index.php" class="text-decoration-none text-muted">Hai già un account? <strong>Accedi</strong></a>
                </div>
            </form>
            <div id="regFeedback" class="mt-3"></div>
        </div>
    </div>
</div>

<script>
document.getElementById('formRegistrazione').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Raccogliamo i dati, inclusi i file (la foto)
    const formData = new FormData();
    formData.append('nome', document.getElementById('reg_nome').value);
    formData.append('cognome', document.getElementById('reg_cognome').value);
    formData.append('email', document.getElementById('reg_email').value);
    formData.append('password', document.getElementById('reg_password').value);
    formData.append('data_nascita', document.getElementById('reg_data').value);
    formData.append('ruolo', document.getElementById('reg_ruolo').value);
    
    const fotoInput = document.getElementById('reg_foto');
    if(fotoInput.files.length > 0) {
        formData.append('foto', fotoInput.files[0]);
    }

    fetch('../backend/registrazione.php', {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        const feedback = document.getElementById('regFeedback');
        if(data.success) {
            feedback.innerHTML = `<div class="alert alert-success shadow-sm">Registrazione completata! Reindirizzamento...</div>`;
            setTimeout(() => window.location.href = '../index.php', 2000);
        } else {
            feedback.innerHTML = `<div class="alert alert-danger shadow-sm">${data.message}</div>`;
        }
    });
});
</script>
</body>
</html>
