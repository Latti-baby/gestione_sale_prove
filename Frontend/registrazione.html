<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione - Gestione Sale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm border-0 mx-auto" style="max-width: 550px;">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0 fw-bold">Crea un nuovo account</h4>
            </div>
            <div class="card-body p-4 bg-white">
                <form id="formRegistrazione" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Nome</label>
                            <input type="text" id="reg_nome" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Cognome</label>
                            <input type="text" id="reg_cognome" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Email</label>
                        <input type="email" id="reg_email" class="form-control" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Password</label>
                            <input type="password" id="reg_password" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small">Data di Nascita</label>
                            <input type="date" id="reg_data" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small">Foto Profilo (Opzionale)</label>
                        <input type="file" id="reg_foto" class="form-control" accept="image/png, image/jpeg, image/jpg, image/gif">
                    </div>

                    <div class="mb-4 p-3 bg-light rounded border">
                        <label class="form-label fw-bold text-primary">🏢 Settore di Appartenenza</label>
                        <select id="reg_settore" class="form-select border-primary" required>
                            <option value="">Caricamento settori...</option>
                        </select>
                        <small class="text-muted">Seleziona il settore in cui studierai o insegnerai.</small>
                    </div>
                    
                    <div id="feedbackReg"></div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Registrati</button>
                </form>
                
                <div class="text-center mt-4 border-top pt-3">
                    <a href="../index.php" class="text-decoration-none fw-bold">← Torna al Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Carica dinamicamente i settori all'apertura della pagina
            fetch('../backend/get_settori.php', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('reg_settore');
                select.innerHTML = '<option value="">-- Scegli un Settore --</option>';
                if(data.success) {
                    data.settori.forEach(s => {
                        select.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
                    });
                }
            });
        });

        document.getElementById('formRegistrazione').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Usiamo FormData per supportare sia il testo che la foto!
            const formData = new FormData();
            formData.append('nome', document.getElementById('reg_nome').value);
            formData.append('cognome', document.getElementById('reg_cognome').value);
            formData.append('email', document.getElementById('reg_email').value);
            formData.append('password', document.getElementById('reg_password').value);
            formData.append('data_nascita', document.getElementById('reg_data').value);
            formData.append('id_settore', document.getElementById('reg_settore').value);
            
            // Selezioniamo la foto se è stata inserita
            const fileFoto = document.getElementById('reg_foto').files[0];
            if (fileFoto) {
                formData.append('foto', fileFoto);
            }

            // Inviamo i dati al server
            fetch('../backend/registrazione.php', {
                method: 'POST',
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                body: formData // Niente più URLSearchParams!
            })
            .then(res => res.json())
            .then(res => {
                const f = document.getElementById('feedbackReg');
                if(res.success) {
                    f.innerHTML = '<div class="alert alert-success shadow-sm">Registrazione completata! Puoi effettuare l\'accesso.</div>';
                    setTimeout(() => window.location.href = '../index.php', 2000);
                } else {
                    f.innerHTML = `<div class="alert alert-danger shadow-sm">${res.message}</div>`;
                }
            })
            .catch(err => {
                document.getElementById('feedbackReg').innerHTML = '<div class="alert alert-danger shadow-sm">Errore di comunicazione col server.</div>';
            });
        });
    </script>
</body>
</html>
