<div class="table-responsive bg-white p-3 rounded shadow-sm">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Attività</th>
                        <th>Sala (Posti Occupati / Max)</th> 
                        <th>Area</th>
                        <th>Data/Ora</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabellaReport">
                </tbody>
            </table>
        </div>
    </div> <div class="modal fade" id="modalModifica" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modifica Prenotazione</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formModifica">
                        <input type="hidden" id="edit_id">
                        <div class="mb-3">
                            <label class="form-label">Attività</label>
                            <input type="text" class="form-control" id="edit_attivita" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control" id="edit_data" required>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <label class="form-label">Ora Inizio</label>
                                <input type="number" class="form-control" id="edit_ora" min="9" max="23" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Durata (h)</label>
                                <input type="number" class="form-control" id="edit_durata" min="1" max="5" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
                    <button type="button" class="btn btn-primary" onclick="salvaModifica()">Salva Modifiche</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
